<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Vertil — Nigerian Brand Voice Engine</title>
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}" />
  <!-- PWA: installable app -->
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#0e9488" />
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='apple-touch-icon.png') }}" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Vertil" />
  <script>if("serviceWorker" in navigator){window.addEventListener("load",function(){navigator.serviceWorker.register("/sw.js").catch(function(){});});}</script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand:  { DEFAULT: "#0e9488", dark: "#0c7a70", bright: "#2dd4bf", tint: "#e4f3f1", ring: "#0e9488" },
            gold:   { DEFAULT: "#b7791f", tint: "#fdf4e3" },
            forest: { DEFAULT: "#0c2724", 2: "#0f322d" },
            ink:    "#13312e",
            muted:  "#5c726e",
            faint:  "#90a39f",
            line:   "#e2e8e6",
            paper:  "#f4f7f6",
          },
          fontFamily: {
            display: ['"Space Grotesk"', "system-ui", "sans-serif"],
            sans: ['"Space Grotesk"', "system-ui", "sans-serif"],
            mono: ['"Space Mono"', "ui-monospace", "monospace"],
          },
          boxShadow: {
            card: "0 1px 2px rgba(12,39,36,.04), 0 1px 3px rgba(12,39,36,.07)",
            lift: "0 6px 16px rgba(12,39,36,.08), 0 2px 6px rgba(12,39,36,.05)",
          },
          borderRadius: { xl2: "1rem" },
        },
      },
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    html, body { overflow-x: clip; max-width: 100%; }
    body { font-family: 'Space Grotesk', system-ui, sans-serif; }
    h1,h2,h3,.font-display { font-family: 'Space Grotesk', system-ui, sans-serif; }
    /* prevent grid blow-out on mobile: bare grids collapse to a safe full-width column */
    #app .grid { grid-auto-columns: minmax(0, 1fr); }
    #app img, #app svg, #app input, #app textarea, #app select { max-width: 100%; }
    .scroll-thin::-webkit-scrollbar { width: 8px; height: 8px; }
    .scroll-thin::-webkit-scrollbar-thumb { background: #cdd9d6; border-radius: 8px; }
    .scroll-thin::-webkit-scrollbar-track { background: transparent; }
    @keyframes pulseDot { 0%,100%{opacity:.25} 50%{opacity:1} }
    .typing span { animation: pulseDot 1s infinite; }
    .typing span:nth-child(2){animation-delay:.18s}
    .typing span:nth-child(3){animation-delay:.36s}
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin .8s linear infinite; }
    @keyframes fadeUp { from{opacity:0; transform:translateY(6px)} to{opacity:1; transform:none} }
    .fade-up { animation: fadeUp .25s ease both; }
    [data-card]:hover { box-shadow: 0 6px 16px rgba(12,39,36,.08), 0 2px 6px rgba(12,39,36,.05); }
    .selectable { transition: box-shadow .15s, border-color .15s, background .15s; }
    /* Vertil wordmark / mark */
    .vword { display:inline-flex; align-items:flex-end; font-weight:600; letter-spacing:-0.04em; line-height:.9; }
    .vi { display:inline-flex; flex-direction:column; align-items:center; justify-content:flex-end; height:.96em; margin:0 .05em .04em; position:relative; }
    .vi-tip { width:0; height:0; border-left:.2em solid transparent; border-right:.2em solid transparent; border-bottom:.28em solid var(--vi,#0e9488); }
    .vi-stem { width:.135em; height:.5em; background:var(--vi,#0e9488); border-radius:.02em; margin-top:.025em; }
    .vi-trail { position:absolute; bottom:1em; left:50%; width:0; height:0; border-left:.15em solid transparent; border-right:.15em solid transparent; border-bottom:.15em solid var(--vi,#2dd4bf); transform:translate(-50%,0); }
    @keyframes vLaunch { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-0.16em)} }
    @keyframes vTrail { 0%{opacity:0;transform:translate(-50%,0.25em)} 35%{opacity:.65} 100%{opacity:0;transform:translate(-50%,-0.8em)} }
    .anim-launch { animation: vLaunch 1.9s ease-in-out infinite; }
    .anim-trail { animation: vTrail 1.9s ease-out infinite; }
    /* boot splash */
    #vsplash { position:fixed; inset:0; z-index:100; background:#0c2724; display:flex; align-items:center; justify-content:center; transition:opacity .5s ease; }
    #vsplash.gone { opacity:0; pointer-events:none; }
  </style>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body class="h-full bg-paper text-ink antialiased">
  <div id="vsplash">
    <div class="vword text-6xl" style="--vi:#2dd4bf;color:#f4f7f6;">Vert<span class="vi anim-launch"><span class="vi-trail anim-trail"></span><span class="vi-tip"></span><span class="vi-stem"></span></span>l</div>
  </div>
  <div id="app" class="min-h-full"></div>
  <script>
    // hide splash once the app has rendered (or after a short max)
    window.__hideSplash = () => { const s=document.getElementById("vsplash"); if(s){ s.classList.add("gone"); setTimeout(()=>s.remove(),550);} };
    setTimeout(()=>window.__hideSplash&&window.__hideSplash(), 2200);
  </script>
  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
